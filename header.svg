  <text x="50%" y="180" text-anchor="middle" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="20" font-weight="400" fill="#7AA2F7" letter-spacing="10">AI-ASSISTED ENGINEER</text>
</svg>
